name: Islamic Clock CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Code
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type Check
        run: pnpm run typecheck

  deploy:
    name: Build & Deploy
    needs: verify
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "./dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  package:
    name: Package Extensions
    needs: verify
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: firefox-signing
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
      WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch Tags
        run: git fetch --tags --force

      - name: Set CI Version
        id: set_ci_version
        run: ./scripts/set-ci-version.sh "$GITHUB_OUTPUT"

      - name: Build Extensions
        run: pnpm run build:extension

      - name: Submit Listed Version to AMO
        if: steps.set_ci_version.outputs.should_publish == 'true'
        run: FIREFOX_CHANNEL=listed REQUIRE_SIGNED_XPI=false ALLOW_LISTED_TIMEOUT=true pnpm run sign:firefox

      - name: Capture Signed Firefox XPI If Available
        if: steps.set_ci_version.outputs.should_publish == 'true'
        id: firefox_xpi
        run: |
          set -euo pipefail
          shopt -s nullglob
          signed=(extension-dist/signed/*.xpi)

          if (( ${#signed[@]} > 0 )); then
            cp "${signed[0]}" islamic_clock-firefox.xpi
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Signed Firefox XPI captured: ${signed[0]}"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No signed Firefox XPI available yet (AMO review likely pending)."
          fi

      - name: Prepare Package Metadata
        if: steps.set_ci_version.outputs.should_publish == 'true'
        id: package_meta
        run: |
          set -euo pipefail

          if [[ "${{ steps.firefox_xpi.outputs.found }}" == "true" ]]; then
            package_files=$'islamic_clock-chrome.zip\nislamic_clock-firefox.xpi'
          else
            package_files='islamic_clock-chrome.zip'
          fi

          {
            echo "files<<EOF"
            echo "$package_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Artifacts
        if: steps.set_ci_version.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: IslamicClock-Extensions
          path: ${{ steps.package_meta.outputs.files }}

      - name: Create Release
        if: steps.set_ci_version.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.set_ci_version.outputs.ci_version }}
          name: "Firefox/Chrome Build v${{ steps.set_ci_version.outputs.ci_version }}"
          body: |
            ## Islamic Clock v${{ steps.set_ci_version.outputs.ci_version }}

            - Chrome: `islamic_clock-chrome.zip`
            - Firefox: signed `islamic_clock-firefox.xpi` if available; otherwise attached after AMO approval.
            - Listed AMO submission started by this workflow.

            > auto-generated release draft.
          draft: true
          prerelease: false
          files: ${{ steps.package_meta.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
