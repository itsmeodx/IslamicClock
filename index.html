<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Prayer Clock</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Prevent FOUC by hiding content until styles load */
        body {
            visibility: hidden;
        }
        body.loaded {
            visibility: visible;
        }
    </style>
    <script>
        /* Inline FOUC prevention - executes immediately */
        (function() {
            function revealBody() {
                document.body.classList.add('loaded');
            }

            // Check if CSS is already loaded
            function checkStylesheet() {
                const link = document.querySelector('link[href="css/styles.css"]');
                if (link && link.sheet) {
                    revealBody();
                    return true;
                }
                return false;
            }

            // Try to reveal immediately if CSS is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() {
                    if (!checkStylesheet()) {
                        // Wait a bit more for CSS
                        setTimeout(revealBody, 50);
                    }
                });
            } else {
                if (!checkStylesheet()) {
                    setTimeout(revealBody, 50);
                }
            }
        })();
    </script>
</head>
<body>
    <!-- Settings Menu -->
    <div class="settings-menu">
        <button class="settings-toggle" id="settings-toggle">⚙️</button>        <div class="settings-panel" id="settings-panel">
            <h3 id="settings-title">Settings</h3>

            <div class="settings-group">
                <label for="language-toggle" id="language-label">Language:</label>
                <div class="toggle-container">
                    <span class="toggle-label-left" id="lang-left-label">English</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="language-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="toggle-label-right" id="lang-right-label">العربية</span>
                </div>
            </div>

            <div class="settings-group">
                <label for="calculation-method" id="calculation-method-label">Calculation Method:</label>
                <select id="calculation-method">
                    <option value="0">Shia Ithna-Ashari, Leva Institute, Qum</option>
                    <option value="1">University of Islamic Sciences, Karachi</option>
                    <option value="2">Islamic Society of North America (ISNA)</option>
                    <option value="3">Muslim World League</option>
                    <option value="4">Umm Al-Qura University, Makkah</option>
                    <option value="5">Egyptian General Authority of Survey</option>
                    <option value="7">Institute of Geophysics, University of Tehran</option>
                    <option value="8">Gulf Region</option>
                    <option value="9">Kuwait</option>
                    <option value="10">Qatar</option>
                    <option value="11">Majlis Ugama Islam Singapura, Singapore</option>
                    <option value="12">Union Organization Islamic de France</option>
                    <option value="13">Diyanet İşleri Başkanlığı, Turkey</option>
                    <option value="14">Spiritual Administration of Muslims of Russia</option>
                    <option value="15">Moonsighting Committee Worldwide (Moonsighting.com)</option>
                    <option value="16">Dubai (experimental)</option>
                    <option value="17">Jabatan Kemajuan Islam Malaysia (JAKIM)</option>
                    <option value="18">Tunisia</option>
                    <option value="19">Algeria</option>
                    <option value="20">Kementerian Agama Republik Indonesia</option>
                    <option value="21">Morocco</option>
                    <option value="22">Comunidade Islamica de Lisboa</option>
                    <option value="23">Ministry of Awqaf, Islamic Affairs and Holy Places, Jordan</option>
                </select>
            </div>

            <div class="settings-group">
                <label for="dst-select" id="daylight-saving-label">Daylight Saving Time:</label>
                <select id="dst-select">
                    <option value="-1">-1 Hour</option>
                    <option value="0">Off</option>
                    <option value="1">+1 Hour</option>
                </select>
            </div>

            <div class="settings-group">
                <label for="progress-toggle" id="progress-section-label">Show Progress Section:</label>
                <div class="toggle-container">
                    <span class="toggle-label-left" id="progress-hide-label">Hide</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="progress-toggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="toggle-label-right" id="progress-show-label">Show</span>
                </div>
            </div>

            <div class="settings-group">
                <label id="prayer-adjustments-label">Prayer Time Adjustments (minutes):</label>
                <div class="offset-controls">
                    <div class="offset-item">
                        <label for="fajr-offset" id="fajr-offset-label">Fajr:</label>
                        <input type="number" id="fajr-offset" min="-30" max="30" value="0">
                    </div>
                    <div class="offset-item">
                        <label for="sunrise-offset" id="sunrise-offset-label">Sunrise:</label>
                        <input type="number" id="sunrise-offset" min="-30" max="30" value="0">
                    </div>
                    <div class="offset-item">
                        <label for="dhuhr-offset" id="dhuhr-offset-label">Dhuhr:</label>
                        <input type="number" id="dhuhr-offset" min="-30" max="30" value="0">
                    </div>
                    <div class="offset-item">
                        <label for="asr-offset" id="asr-offset-label">Asr:</label>
                        <input type="number" id="asr-offset" min="-30" max="30" value="0">
                    </div>
                    <div class="offset-item">
                        <label for="maghrib-offset" id="maghrib-offset-label">Maghrib:</label>
                        <input type="number" id="maghrib-offset" min="-30" max="30" value="0">
                    </div>
                    <div class="offset-item">
                        <label for="isha-offset" id="isha-offset-label">Isha:</label>
                        <input type="number" id="isha-offset" min="-30" max="30" value="0">
                    </div>
                </div>
            </div>

            <div class="settings-group">
                <label for="clock-mode-toggle" id="clock-mode-label">Clock Mode:</label>
                <div class="toggle-container">
                    <span class="toggle-label-left" id="clock-mode-left-label">Digital</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="clock-mode-toggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="toggle-label-right" id="clock-mode-right-label">Analog</span>
                </div>
            </div>

            <div class="settings-actions">()
                <button class="settings-btn refresh" id="refresh-data">Refresh</button>
                <button class="settings-btn primary" id="save-settings">Save</button>
                <button class="settings-btn secondary" id="reset-settings">Reset</button>
            </div>
        </div>
    </div>

    <!-- Page Title -->
    <h1 class="page-title">🕌 Islamic Prayer Clock</h1>

    <div class="clock-container">
        <div id="digital-display" class="digital-clock">
            <div id="time-display">00:00:00</div>
            <div id="date-display" class="date-display"></div>
        </div>

        <div id="analog-display" class="analog-clock" style="display: none;">
            <canvas id="clock-canvas" class="clock-canvas"></canvas>
            <div id="location-info" class="location-info"></div>
            <div id="hijri-date" class="hijri-date"></div>
        </div>

    <script src="js/main.js"></script>
</body>
</html>
